name: Sync to Hugging Face Space

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  sync-space:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push source to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          set -euxo pipefail

          test -n "${HF_TOKEN}"
          test -n "${HF_SPACE}"

          git remote remove hf-space || true
          git remote add hf-space "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"

          git push hf-space HEAD:main --force
